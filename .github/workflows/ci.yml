name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install uv

      - name: Run Python tests
        run: uv run pytest

  installer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: installer/package-lock.json

      - name: Install installer deps
        working-directory: installer
        run: npm ci

      - name: Run installer tests
        working-directory: installer
        run: npm test

      - name: Build installer
        working-directory: installer
        run: npm run build
